services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: team-sign-off-backend
    environment:
      APP_DATABASE_URL: sqlite+aiosqlite:///./data/data.db
      APP_DEBUG: "false"
      APP_OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080/realms/team-sign-off}
      APP_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-team-sign-off-frontend}
      APP_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      APP_CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OIDC_AUTHORITY: ${OIDC_ISSUER:-http://localhost:8080/realms/team-sign-off}
        VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-team-sign-off-frontend}
        VITE_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    container_name: team-sign-off-frontend
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://host.docker.internal:8080}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app-data:
    driver: local
